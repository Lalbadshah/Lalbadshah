<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Prateek Bhatnagar — Engineering, AI research, AI product">
  <defs>
    <!-- Terracotta dither dot grids — two scales, like the site's dithering shader -->
    <pattern id="dots-fine" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="none"/>
      <circle cx="3" cy="3" r="1" fill="#d97757"/>
    </pattern>
    <pattern id="dots-coarse" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="none"/>
      <circle cx="6" cy="6" r="1.6" fill="#d97757"/>
    </pattern>
    <!-- Organic fade for the dither field -->
    <radialGradient id="fade" cx="78%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <mask id="dither-mask">
      <rect width="1200" height="420" fill="url(#fade)"/>
    </mask>
    <radialGradient id="fade2" cx="88%" cy="78%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <mask id="dither-mask2">
      <rect width="1200" height="420" fill="url(#fade2)"/>
    </mask>
  </defs>

  <style>
    .mono  { font-family: ui-monospace, "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace; }
    .serif { font-family: "Source Serif 4", Georgia, "Times New Roman", serif; font-style: italic; }
    .fg     { fill: #f5f5f0; }
    .ash    { fill: #ffffff; fill-opacity: 0.72; }
    .smoke  { fill: #ffffff; fill-opacity: 0.40; }
    .accent { fill: #d97757; }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    .pulse  { animation: breathe 6s ease-in-out infinite; }
    @keyframes blink   { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
    @keyframes breathe { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .cursor, .pulse { animation: none; }
    }
  </style>

  <!-- Canvas -->
  <rect width="1200" height="420" fill="#000000"/>

  <!-- Dither field, right side -->
  <g class="pulse">
    <rect x="520" y="0" width="680" height="420" fill="url(#dots-fine)" mask="url(#dither-mask)"/>
    <rect x="640" y="60" width="560" height="360" fill="url(#dots-coarse)" mask="url(#dither-mask2)" opacity="0.7"/>
  </g>

  <!-- Frame + corner ticks -->
  <rect x="0.5" y="0.5" width="1199" height="419" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>
  <path d="M0.5 24 V0.5 H24"        fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M1176 0.5 H1199.5 V24"   fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M0.5 396 V419.5 H24"     fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M1176 419.5 H1199.5 V396" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Eyebrow -->
  <text x="64" y="84" class="mono ash" font-size="13" letter-spacing="3">PRATEEK BHATNAGAR <tspan class="accent">//</tspan> LONDON, UK <tspan class="accent">//</tspan> EST. 2018</text>
  <line x1="64" y1="104" x2="560" y2="104" stroke="#ffffff" stroke-opacity="0.18"/>

  <!-- Headline -->
  <text x="60" y="186" class="mono fg" font-size="74" font-weight="700" letter-spacing="5">PRATEEK</text>
  <text x="60" y="266" class="mono fg" font-size="74" font-weight="700" letter-spacing="5">BHATNAGAR</text>
  <rect x="528" y="216" width="30" height="54" class="accent cursor"/>

  <!-- Serif italic accent line -->
  <text x="62" y="318" class="serif accent" font-size="27">Engineering · AI research · AI product.</text>

  <!-- Footer telemetry -->
  <line x1="64" y1="354" x2="1136" y2="354" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="64" y="384" class="mono smoke" font-size="12" letter-spacing="2">8+ YRS SHIPPING <tspan class="accent">//</tspan> 3 FDA 510(K) DEVICES <tspan class="accent">//</tspan> 1 U.S. PATENT <tspan class="accent">//</tspan> 30K+ PLATFORM USERS</text>
  <text x="1136" y="384" text-anchor="end" class="mono smoke" font-size="12" letter-spacing="2">∞ PB.OPERATIONS.LOG</text>
</svg>
